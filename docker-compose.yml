services:

  # ── 1. Backend FastAPI ─────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:80"
    volumes:
      - ./data/users.json:/app/data/users.json
      - ./data/predictions_log.jsonl:/app/data/predictions_log.jsonl
      - ./models:/app/models:ro

  # ── 2. Reverse proxy Nginx ─────────────────────────────────────────────────
  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

  # ── 3. Interface Streamlit ─────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8501:8501"
    environment:
      - MODELS_DIR=/app/models
    volumes:
      - ./models:/app/models:ro
    depends_on:
      - nginx
